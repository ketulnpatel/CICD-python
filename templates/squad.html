{% extends "base.html" %}
{% block title %}— Squad{% endblock %}

{% block head %}
<style>
  .pos-filter {
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px;
  }
  .filter-btn {
    padding:8px 20px; border-radius:100px;
    border:1px solid var(--border);
    background:transparent; color:var(--muted);
    font-family:'Inter', sans-serif;
    font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.2s;
    letter-spacing:0.5px;
  }
  .filter-btn:hover, .filter-btn.active {
    background:var(--red); color:#fff;
    border-color:var(--red);
  }

  .squad-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
    gap:16px;
  }
  .player-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    transition:all 0.2s;
    cursor:pointer;
  }
  .player-card:hover {
    border-color:rgba(239,1,7,0.5);
    transform:translateY(-4px);
    box-shadow:0 12px 32px rgba(239,1,7,0.15);
  }
  .player-card-top {
    background:linear-gradient(135deg, #1a0000, #2a0000);
    padding:24px 20px 16px;
    text-align:center;
    position:relative;
  }
  .player-number {
    position:absolute; top:12px; left:14px;
    font-family:'Oswald', sans-serif;
    font-size:1.8rem; font-weight:700;
    color:rgba(255,255,255,0.15);
    line-height:1;
  }
  .player-nationality { font-size:2rem; margin-bottom:8px; }
  .player-pos-badge {
    display:inline-block;
    padding:3px 10px; border-radius:100px;
    font-size:11px; font-weight:600; letter-spacing:1px;
  }
  .pos-GK  { background:rgba(197,160,40,0.2); color:var(--gold); border:1px solid rgba(197,160,40,0.3); }
  .pos-DEF { background:rgba(77,166,255,0.2); color:#4da6ff; border:1px solid rgba(77,166,255,0.3); }
  .pos-MID { background:rgba(0,200,100,0.2); color:#00c864; border:1px solid rgba(0,200,100,0.3); }
  .pos-FWD { background:rgba(239,1,7,0.2); color:var(--red); border:1px solid rgba(239,1,7,0.3); }

  .player-card-body { padding:14px 16px; }
  .player-name { font-weight:700; font-size:14px; margin-bottom:12px; line-height:1.3; }
  .player-stats { display:flex; gap:0; border-top:1px solid var(--border); margin-top:10px; padding-top:10px; }
  .pstat { flex:1; text-align:center; }
  .pstat:not(:last-child) { border-right:1px solid var(--border); }
  .pstat-num { font-family:'Oswald', sans-serif; font-size:1.3rem; color:#fff; font-weight:700; }
  .pstat-label { font-size:10px; color:var(--muted); letter-spacing:0.5px; }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="section-title">THE <span>SQUAD</span></div>
  <div class="section-line"></div>

  <div class="pos-filter">
    <button class="filter-btn active" onclick="filter('ALL', this)">All Players</button>
    <button class="filter-btn" onclick="filter('GK', this)">Goalkeepers</button>
    <button class="filter-btn" onclick="filter('DEF', this)">Defenders</button>
    <button class="filter-btn" onclick="filter('MID', this)">Midfielders</button>
    <button class="filter-btn" onclick="filter('FWD', this)">Forwards</button>
  </div>

  <div class="squad-grid" id="squadGrid">
    {% for p in squad %}
    <div class="player-card" data-pos="{{ p.position }}">
      <div class="player-card-top">
        <div class="player-number">{{ p.number }}</div>
        <div class="player-nationality">{{ p.nationality }}</div>
        <span class="player-pos-badge pos-{{ p.position }}">{{ p.position }}</span>
      </div>
      <div class="player-card-body">
        <div class="player-name">{{ p.name }}</div>
        <div class="player-stats">
          <div class="pstat">
            <div class="pstat-num">⚽ {{ p.goals }}</div>
            <div class="pstat-label">Goals</div>
          </div>
          <div class="pstat">
            <div class="pstat-num">🎯 {{ p.assists }}</div>
            <div class="pstat-label">Assists</div>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
function filter(pos, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.player-card').forEach(c => {
    c.style.display = (pos === 'ALL' || c.dataset.pos === pos) ? 'block' : 'none';
  });
}
</script>
{% endblock %}
