<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsenal FC {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #EF0107;
      --dark-red: #9B0000;
      --gold: #C5A028;
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; }

    /* NAV */
    nav {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
      border-bottom: 3px solid var(--red);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 70px;
      position: sticky; top:0; z-index:100;
      box-shadow: 0 4px 30px rgba(239,1,7,0.15);
    }
    .nav-brand {
      display:flex; align-items:center; gap:14px;
      text-decoration:none;
    }
    .nav-logo {
      width:44px; height:44px;
      background: var(--red);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:22px;
      box-shadow: 0 0 20px rgba(239,1,7,0.5);
    }
    .nav-name {
      font-family:'Oswald', sans-serif;
      font-size:1.5rem; font-weight:700;
      color:#fff; letter-spacing:2px;
    }
    .nav-name span { color:var(--gold); }
    .nav-links { display:flex; gap:8px; }
    .nav-links a {
      color:var(--muted);
      text-decoration:none;
      padding:8px 18px;
      border-radius:6px;
      font-size:14px; font-weight:500;
      transition:all 0.2s;
      letter-spacing:0.5px;
    }
    .nav-links a:hover, .nav-links a.active {
      color:#fff;
      background:rgba(239,1,7,0.2);
      border: 1px solid rgba(239,1,7,0.4);
    }

    /* CONTENT */
    .page { padding: 48px 40px; max-width: 1100px; margin: 0 auto; }

    /* SECTION TITLE */
    .section-title {
      font-family:'Oswald', sans-serif;
      font-size:2rem; font-weight:700;
      letter-spacing:2px;
      margin-bottom:6px;
    }
    .section-title span { color:var(--red); }
    .section-line {
      width:60px; height:3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius:2px;
      margin-bottom:32px;
    }

    /* FOOTER */
    footer {
      border-top:1px solid var(--border);
      padding:24px 40px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:60px;
    }
    footer span { color:var(--red); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">
      <div class="nav-logo">⚽</div>
      <div class="nav-name">ARSENAL <span>FC</span></div>
    </a>
    <div class="nav-links">
      <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
      <a href="/squad" {% if request.path == '/squad' %}class="active"{% endif %}>Squad</a>
      <a href="/results" {% if request.path == '/results' %}class="active"{% endif %}>Results</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <p>© 2025 <span>Arsenal FC</span> Fan Dashboard — Built with Flask + Docker + GitHub Actions</p>
  </footer>
</body>
</html>
