{% extends "base.html" %}
{% block title %}— Results{% endblock %}

{% block head %}
<style>
  .results-list { display:flex; flex-direction:column; gap:12px; }
  .result-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px 24px;
    display:grid;
    grid-template-columns:80px 1fr auto auto;
    align-items:center; gap:20px;
    transition:all 0.2s;
  }
  .result-card:hover { border-color:rgba(239,1,7,0.4); transform:translateX(4px); }
  .result-card.W { border-left:4px solid #00c864; }
  .result-card.D { border-left:4px solid var(--gold); }
  .result-card.L { border-left:4px solid var(--red); }

  .rc-badge {
    width:56px; height:56px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald', sans-serif; font-size:1.6rem; font-weight:700;
  }
  .rc-badge.W { background:rgba(0,200,100,0.1); color:#00c864; border:1px solid rgba(0,200,100,0.3); }
  .rc-badge.D { background:rgba(255,209,70,0.1); color:var(--gold); border:1px solid rgba(255,209,70,0.3); }
  .rc-badge.L { background:rgba(239,1,7,0.1); color:var(--red); border:1px solid rgba(239,1,7,0.3); }

  .rc-opp { font-weight:700; font-size:1.1rem; margin-bottom:4px; }
  .rc-meta { font-size:12px; color:var(--muted); }
  .rc-venue {
    display:inline-block;
    padding:2px 10px; border-radius:100px;
    font-size:11px; font-weight:600; margin-left:8px;
  }
  .rc-venue.Home { background:rgba(239,1,7,0.1); color:var(--red); border:1px solid rgba(239,1,7,0.2); }
  .rc-venue.Away { background:rgba(136,136,136,0.1); color:var(--muted); border:1px solid var(--border); }

  .rc-score {
    font-family:'Oswald', sans-serif;
    font-size:2rem; font-weight:700;
    color:#fff; letter-spacing:2px;
    white-space:nowrap;
  }

  .record-strip {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:16px; margin-bottom:36px;
  }
  .record-item {
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:20px; text-align:center;
  }
  .record-num {
    font-family:'Oswald', sans-serif;
    font-size:2.5rem; font-weight:700; line-height:1;
  }
  .record-num.w { color:#00c864; }
  .record-num.d { color:var(--gold); }
  .record-num.l { color:var(--red); }
  .record-lbl { color:var(--muted); font-size:12px; letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  @media(max-width:600px) {
    .result-card { grid-template-columns:56px 1fr; }
    .rc-score { font-size:1.4rem; }
  }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="section-title">LATEST <span>RESULTS</span></div>
  <div class="section-line"></div>

  <div class="record-strip">
    <div class="record-item">
      <div class="record-num w">22</div>
      <div class="record-lbl">Wins</div>
    </div>
    <div class="record-item">
      <div class="record-num d">6</div>
      <div class="record-lbl">Draws</div>
    </div>
    <div class="record-item">
      <div class="record-num l">6</div>
      <div class="record-lbl">Losses</div>
    </div>
  </div>

  <div class="results-list">
    {% for r in results %}
    <div class="result-card {{ r.result }}">
      <div class="rc-badge {{ r.result }}">{{ r.result }}</div>
      <div>
        <div class="rc-opp">{{ r.opponent }}</div>
        <div class="rc-meta">
          {{ r.date }}
          <span class="rc-venue {{ r.venue }}">{{ r.venue }}</span>
        </div>
      </div>
      <div class="rc-score">{{ r.score }}</div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
