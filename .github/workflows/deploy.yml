name: Deploy Arsenal App

on:
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:

            - name: check out code
              uses: actions/checkout@v4

            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: pip install -r requirements.txt

            - name: run tests
              run: PYTHONPATH=${{ github.workspace }} pytest tests/ -v
              working-directory: ${{ github.workspace }}

            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: build and push docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: ketulnpatel/arsenal-app:latest

            - name: deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                  docker pull ketulnpatel/arsenal-app:latest
                  docker stop arsenal-app || true
                  docker rm arsenal-app || true
                  docker run -d -p 5001:5000 --name arsenal-app --restart unless-stopped ketulnpatel/arsenal-app:latest   
              
              

            



        